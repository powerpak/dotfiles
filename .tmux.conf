# Reverse the colors of the current window in the status bar
setw -g window-status-current-format "#[reverse] #I:#W"

# Use Ctrl + Shift + square brackets to change windows
bind-key -n C-S-[ previous-window
bind-key -n C-S-] next-window

# Have windows count up from 1, not 0, and automatically renumber 
# when a window is closed--makes it easier to use tmux-key + # keys
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Allow modifiers + Enter key to work correctly (for coding agents)
set -g extended-keys on
set -g extended-keys-format csi-u

# Allow the mousewheel to scrollback the current window
set -g mouse on
set -g history-limit 50000
